version: "3.9"

services:
  master:
    build:
      context: ..
      dockerfile: server/Dockerfile
    image: novaMP-master:latest
    container_name: novaMP-master
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - master_data:/app/data
      - ./config.toml:/app/config.toml:ro
      - ./schema.sql:/app/schema.sql:ro
    environment:
      - TZ=UTC
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  master_data:
